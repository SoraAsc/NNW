name: Build Native + Bindings + Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  native:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3-dev zip

      - name: Configure CMake
        shell: bash
        run: |
          mkdir -p build
          cd build
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake .. -A x64 -DBUILD_EXAMPLES=OFF
          else
            cmake .. -DBUILD_EXAMPLES=OFF
          fi

      - name: Build C++
        shell: bash
        run: |
          cd build
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake --build . --config Release
          else
            cmake --build . --config Release -- -j$(nproc)
          fi

      - name: Prepare artifacts dir
        shell: bash
        run: |
          mkdir -p artifacts/native

      - name: Copy and rename native library
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            LIB_EXT="dll"
          else
            LIB_EXT="so"
          fi

          LIB_PATH=$(find build -maxdepth 6 -type f -name "nn.${LIB_EXT}" | head -n 1)
          if [ -z "$LIB_PATH" ]; then
            echo "Native lib not found!"
            exit 1
          fi
          echo "Found native lib at: $LIB_PATH"
          cp "$LIB_PATH" "artifacts/native/nn.${LIB_EXT}"

      - name: Upload native artifact (per OS)
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: artifacts/native/*

  wheel:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download native libs (linux runner artifact)
        uses: actions/download-artifact@v5
        with:
          name: native-ubuntu-latest
          path: native_artifacts/linux

      - name: Download native libs (windows runner artifact)
        uses: actions/download-artifact@v5
        with:
          name: native-windows-latest
          path: native_artifacts/windows

      - name: Copy native libs into python package
        run: |
          mkdir -p bindings/python/nnw/libs
          cp native_artifacts/linux/* bindings/python/nnw/libs/
          cp native_artifacts/windows/* bindings/python/nnw/libs/

      - name: Build python wheel
        working-directory: bindings/python
        run: |
          python -m pip install --upgrade pip build
          python -m build -w -o ../../artifacts/python

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: artifacts/python/*.whl

  csharp:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download native libs (linux runner artifact)
        uses: actions/download-artifact@v5
        with:
          name: native-ubuntu-latest
          path: native_artifacts/linux

      - name: Download native libs (windows runner artifact)
        uses: actions/download-artifact@v5
        with:
          name: native-windows-latest
          path: native_artifacts/windows

      - name: Copy native libs into C# package
        run: |
          mkdir -p bindings/c#/runtimes/win-x64/native
          mkdir -p bindings/c#/runtimes/linux-x64/native
          cp native_artifacts/linux/* bindings/c#/runtimes/linux-x64/native/
          cp native_artifacts/windows/* bindings/c#/runtimes/win-x64/native/

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build C# project
        working-directory: bindings/c#
        run: |
          dotnet restore
          dotnet build -c Release
          dotnet pack -c Release -o ../../artifacts/csharp

      - name: Upload C# artifacts
        uses: actions/upload-artifact@v4
        with:
          name: csharp
          path: artifacts/csharp/*.nupkg

  release:
    needs: [native, wheel, csharp]
    runs-on: ubuntu-latest

    steps:
      - name: Download wheel
        uses: actions/download-artifact@v5
        with:
          name: wheel
          path: release_artifacts/wheel

      - name: Download native linux
        uses: actions/download-artifact@v5
        with:
          name: native-ubuntu-latest
          path: release_artifacts/native/linux

      - name: Download native windows
        uses: actions/download-artifact@v5
        with:
          name: native-windows-latest
          path: release_artifacts/native/windows

      - name: Download C# artifacts
        uses: actions/download-artifact@v5
        with:
          name: csharp
          path: release_artifacts/csharp

      - name: List release files
        run: |
          ls -la release_artifacts || true
          find release_artifacts -maxdepth 3 -type f -print

      - name: Create GitHub Release and upload files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_artifacts/wheel/*.whl
            release_artifacts/native/**/*
            release_artifacts/csharp/*.nupkg

  release-unity:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Native artifacts (Linux)
        uses: actions/download-artifact@v5
        with:
          name: native-ubuntu-latest
          path: native_artifacts/linux

      - name: Download Native artifacts (Windows)
        uses: actions/download-artifact@v5
        with:
          name: native-windows-latest
          path: native_artifacts/windows

      - name: Prepare Workspace
        run: |
          rm -rf .unity-branch
          mkdir -p .unity-branch/Runtime/Plugins
          cp -R bindings/unity/* .unity-branch/
          cp -R native_artifacts/linux/* .unity-branch/Runtime/Plugins/
          cp -R native_artifacts/windows/* .unity-branch/Runtime/Plugins/

      - name: Configure git
        run: |
          git config user.name "SoraAsc"
          git config user.email "57465032+SoraAsc@users.noreply.github.com"

      - name: Switch to unity branch
        run: |
          git fetch origin unity || true
          git checkout -B unity

      - name: Replace contents of branch
        run: |
          git rm -rf --cached .
          rm -rf * .github .gitignore
          cp -R .unity-branch/* .
          rm -rf .unity-branch
          git add -A
          git commit -m "Update unity branch" || echo "No changes to commit"
          git push origin unity --force