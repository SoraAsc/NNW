name: Build Native + Bindings + Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  native:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3-dev zip

      - name: Configure CMake
        shell: bash
        run: |
          mkdir -p build
          cd build
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake .. -A x64 -DBUILD_EXAMPLES=OFF
          else
            cmake .. -DBUILD_EXAMPLES=OFF
          fi

      - name: Build C++
        shell: bash
        run: |
          cd build
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake --build . --config Release
          else
            cmake --build . --config Release -- -j$(nproc)
          fi

      - name: Copy and rename native library
        shell: bash
        run: |
          mkdir -p artifacts/native
          if [ "${{ runner.os }}" = "Windows" ]; then
            LIB_EXT="dll"
          else
            LIB_EXT="so"
          fi

          LIB_PATH=$(find build -maxdepth 6 -type f -name "nn.${LIB_EXT}" | head -n 1)
          if [ -z "$LIB_PATH" ]; then
            echo "Native lib not found!"
            exit 1
          fi
          echo "Found native lib at: $LIB_PATH"
          cp "$LIB_PATH" "artifacts/native/nn.${LIB_EXT}"

      - name: Upload native artifact (per OS)
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.os }}
          path: artifacts/native/*

      - name: Upload native to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/native/*

  webgl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v15
        with:
          version: latest

      - name: Configure CMake for WebGL
        shell: bash
        run: |
          mkdir -p build-webgl
          cd build-webgl
          emcmake cmake .. -DBUILD_EXAMPLES=OFF

      - name: Build WebGL
        shell: bash
        run: |
          cd build-webgl
          cmake --build . --config Release -- -j$(nproc)

      - name: Prepare WebGL artifacts
        shell: bash
        run: |
          mkdir -p artifacts/webgl
          cp build-webgl/nn.js artifacts/webgl/
          cp build-webgl/nn.wasm artifacts/webgl/ 2>/dev/null || true

      - name: Upload WebGL artifact
        uses: actions/upload-artifact@v7
        with:
          name: webgl
          path: artifacts/webgl/*

  wheel:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download native libs (Linux)
        uses: actions/download-artifact@v8
        with:
          name: native-ubuntu-latest
          path: native_artifacts/linux

      - name: Download native libs (Windows)
        uses: actions/download-artifact@v8
        with:
          name: native-windows-latest
          path: native_artifacts/windows

      - name: Copy native libs into python package
        run: |
          mkdir -p bindings/python/nnw/libs
          cp native_artifacts/linux/* bindings/python/nnw/libs/
          cp native_artifacts/windows/* bindings/python/nnw/libs/

      - name: Build python wheel
        working-directory: bindings/python
        run: |
          python -m pip install --upgrade pip build
          python -m build -w -o ../../artifacts/python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: artifacts/python/*.whl

      - name: Upload wheel to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/python/*.whl

  csharp:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download native libs (Linux)
        uses: actions/download-artifact@v8
        with:
          name: native-ubuntu-latest
          path: native_artifacts/linux

      - name: Download native libs (Windows)
        uses: actions/download-artifact@v8
        with:
          name: native-windows-latest
          path: native_artifacts/windows

      - name: Copy native libs into C# package
        run: |
          mkdir -p bindings/c#/runtimes/win-x64/native
          mkdir -p bindings/c#/runtimes/linux-x64/native
          cp native_artifacts/linux/* bindings/c#/runtimes/linux-x64/native/
          cp native_artifacts/windows/* bindings/c#/runtimes/win-x64/native/

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build C# project
        working-directory: bindings/c#
        run: |
          dotnet restore
          dotnet build -c Release
          dotnet pack -c Release -o ../../artifacts/csharp

      - name: Upload C# artifacts
        uses: actions/upload-artifact@v7
        with:
          name: csharp
          path: artifacts/csharp/*.nupkg

      - name: Upload C# to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/csharp/*.nupkg

  release-unity:
    runs-on: ubuntu-latest
    needs: [native, webgl]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Native artifacts (Linux)
        uses: actions/download-artifact@v8
        with:
          name: native-ubuntu-latest
          path: native_artifacts/linux

      - name: Download Native artifacts (Windows)
        uses: actions/download-artifact@v8
        with:
          name: native-windows-latest
          path: native_artifacts/windows

      - name: Download WebGL artifacts
        uses: actions/download-artifact@v8
        with:
          name: webgl
          path: native_artifacts/webgl

      - name: Prepare Workspace
        run: |
          rm -rf .unity-branch
          mkdir -p .unity-branch/Runtime/Plugins/WebGL
          cp -R bindings/unity/* .unity-branch/
          cp -R bindings/c#/src/Core .unity-branch/Runtime/
          cp -R native_artifacts/linux/* .unity-branch/Runtime/Plugins/
          cp -R native_artifacts/windows/* .unity-branch/Runtime/Plugins/
          cp -R native_artifacts/webgl/* .unity-branch/Runtime/Plugins/WebGL/

      - name: Update package.json
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" .unity-branch/package.json
          sed -i "s|\"changelogUrl\": \".*\"|\"changelogUrl\": \"${RELEASE_URL}\"|" .unity-branch/package.json

      - name: Configure git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Switch to unity branch
        run: |
          git fetch origin unity || true
          git checkout -B unity

      - name: Replace contents of branch
        run: |
          TAG="${{ github.ref_name }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          git rm -rf --cached .
          rm -rf * .github .gitignore
          cp -R .unity-branch/* .
          rm -rf .unity-branch
          git add -A
          git commit -m "Release ${TAG}

          Full release (binaries, changelog): ${RELEASE_URL}" || echo "No changes to commit"
          git tag "upm/${TAG}"
          git push origin unity --force
          git push origin "upm/${TAG}"